<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LÖT — Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; height: 100vh; display: flex; flex-direction: column; }

    #header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header .logo { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #fff; }
    #header .logo span { color: #C8FF00; }

    #controls {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .layer-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .layer-btn.active {
      background: #C8FF00;
      color: #000;
      border-color: #C8FF00;
      font-weight: 600;
    }

    #map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    #legend {
      position: absolute;
      bottom: 20px;
      right: 10px;
      background: rgba(17,17,17,0.92);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      z-index: 1000;
      min-width: 140px;
      display: none;
    }
    #legend.visible { display: block; }
    #legend h4 { color: #C8FF00; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #ccc; }
    .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

    .leaflet-popup-content-wrapper {
      background: #111 !important;
      border: 1px solid #333 !important;
      border-radius: 8px !important;
      color: #fff !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: #111 !important; }
    .leaflet-popup-content { margin: 12px 16px !important; }
    .popup-title { font-size: 13px; font-weight: 700; color: #C8FF00; margin-bottom: 8px; }
    .popup-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 4px; font-size: 12px; }
    .popup-label { color: #888; }
    .popup-value { color: #fff; font-weight: 500; text-align: right; }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">L<span>Ö</span>T</div>
  <div style="font-size:11px; color:#555;">Mapa de referencia — Bogotá D.C.</div>
</div>

<div id="controls">
  <button class="layer-btn active" data-layer="lotes" onclick="toggleLayer('lotes', this)">🏗 Lotes</button>
  <button class="layer-btn active" data-layer="upz" onclick="toggleLayer('upz', this)">📐 UPZ</button>
  <button class="layer-btn" data-layer="estrato" onclick="toggleLayer('estrato', this)">🏘 Estratificación</button>
  <button class="layer-btn" data-layer="localidad" onclick="toggleLayer('localidad', this)">📍 Localidades</button>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="legend">
    <h4 id="legend-title">Leyenda</h4>
    <div id="legend-body"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const BASE_WMS = "https://serviciosgis.catastrobogota.gov.co/arcgis/services";

  const map = L.map('map', {
    center: [4.6534, -74.0836],
    zoom: 13,
    zoomControl: true
  });

  // Base map oscuro
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 20
  }).addTo(map);

  // WMS layers
  const wmsLayers = {
    lotes: L.tileLayer.wms(BASE_WMS + "/catastro/lote/MapServer/WMSServer", {
      layers: '0',
      format: 'image/png',
      transparent: true,
      opacity: 0.7,
      attribution: 'IDECA - Catastro Bogotá'
    }),
    upz: L.tileLayer.wms(BASE_WMS + "/ordenamientoterritorial/unidadplaneamientozonal/MapServer/WMSServer", {
      layers: '0',
      format: 'image/png',
      transparent: true,
      opacity: 0.5,
      attribution: 'IDECA'
    }),
    estrato: L.tileLayer.wms(BASE_WMS + "/ordenamientoterritorial/estratificacion/MapServer/WMSServer", {
      layers: '1',
      format: 'image/png',
      transparent: true,
      opacity: 0.6,
      attribution: 'IDECA'
    }),
    localidad: L.tileLayer.wms(BASE_WMS + "/ordenamientoterritorial/localidad/MapServer/WMSServer", {
      layers: '0',
      format: 'image/png',
      transparent: true,
      opacity: 0.4,
      attribution: 'IDECA'
    })
  };

  // Estado activo
  const activeState = { lotes: true, upz: true, estrato: false, localidad: false };

  // Añadir capas activas por defecto
  Object.keys(activeState).forEach(key => {
    if (activeState[key]) wmsLayers[key].addTo(map);
  });

  function toggleLayer(name, btn) {
    if (activeState[name]) {
      map.removeLayer(wmsLayers[name]);
      activeState[name] = false;
      btn.classList.remove('active');
    } else {
      wmsLayers[name].addTo(map);
      activeState[name] = true;
      btn.classList.add('active');
    }
    updateLegend();
  }

  // Leyendas
  const legends = {
    estrato: {
      title: 'Estratificación',
      items: [
        { color: '#3182bd', label: 'Estrato 1' },
        { color: '#6baed6', label: 'Estrato 2' },
        { color: '#74c476', label: 'Estrato 3' },
        { color: '#fd8d3c', label: 'Estrato 4' },
        { color: '#e6550d', label: 'Estrato 5' },
        { color: '#a63603', label: 'Estrato 6' },
      ]
    }
  };

  function updateLegend() {
    const legendEl = document.getElementById('legend');
    const legendBody = document.getElementById('legend-body');
    if (activeState.estrato) {
      legendEl.classList.add('visible');
      document.getElementById('legend-title').textContent = 'Estratificación';
      legendBody.innerHTML = legends.estrato.items.map(i =>
        `<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.label}</div>`
      ).join('');
    } else {
      legendEl.classList.remove('visible');
    }
  }

  // Marcador de lote seleccionado
  let marker = null;

  // Click en el mapa → mostrar popup con datos del backend Base44
  map.on('click', function(e) {
    const { lat, lng } = e.latlng;

    if (marker) map.removeLayer(marker);

    marker = L.circleMarker([lat, lng], {
      radius: 8,
      fillColor: '#C8FF00',
      color: '#000',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.9
    }).addTo(map);

    const popup = L.popup({ maxWidth: 260 })
      .setLatLng([lat, lng])
      .setContent(`
        <div class="popup-title">📍 Punto seleccionado</div>
        <div class="popup-row"><span class="popup-label">Lat</span><span class="popup-value">${lat.toFixed(6)}</span></div>
        <div class="popup-row"><span class="popup-label">Lng</span><span class="popup-value">${lng.toFixed(6)}</span></div>
        <div class="popup-row" style="margin-top:8px;"><span class="popup-label" style="color:#C8FF00;font-size:11px;">Los datos del lote se cargan desde el panel LÖT</span></div>
      `)
      .openOn(map);
  });

  // Función pública para centrar el mapa en un lote desde Base44
  window.lotFlyTo = function(lat, lng, zoom = 17) {
    map.flyTo([lat, lng], zoom, { duration: 1.2 });
    if (marker) map.removeLayer(marker);
    marker = L.circleMarker([lat, lng], {
      radius: 10,
      fillColor: '#C8FF00',
      color: '#000',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.9
    }).addTo(map);
  };

  // Función para mostrar popup con datos reales desde Base44
  window.lotShowData = function(lat, lng, data) {
    if (marker) map.removeLayer(marker);
    marker = L.circleMarker([lat, lng], {
      radius: 10,
      fillColor: '#C8FF00',
      color: '#000',
      weight: 2,
      fillOpacity: 0.9
    }).addTo(map);

    L.popup({ maxWidth: 280 })
      .setLatLng([lat, lng])
      .setContent(`
        <div class="popup-title">🏗 ${data.direccion || 'Lote'}</div>
        <div class="popup-row"><span class="popup-label">Localidad</span><span class="popup-value">${data.localidad || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">UPZ</span><span class="popup-value">${data.upz || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">Estrato</span><span class="popup-value">${data.estrato || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">Suelo</span><span class="popup-value">${data.clasificacionSuelo || '—'}</span></div>
        <div class="popup-row"><span class="popup-label">Área</span><span class="popup-value">${data.area || '—'} m²</span></div>
      `)
      .openOn(map);
  };
</script>
</body>
</html>
